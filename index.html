<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KELULUSAN SMP NEGERI 2 KOTO GASIB</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap');

        body { font-family: 'Plus Jakarta Sans', sans-serif; background:#f8fafc; margin:0; }
        .font-elegant { font-family:'Playfair Display', serif; }
        .bg-custom { background: radial-gradient(circle at top right,#dbeafe,#fff,#f1f5f9); }

        .logo-img { height:3.5rem; object-fit:contain; }
        .logo-img-surat { height:4rem; object-fit:contain; }
    </style>
</head>

<body class="bg-custom min-h-screen flex flex-col">

<!-- HEADER -->
<header class="w-full py-6 px-6 border-b bg-white/70 backdrop-blur-md">
    <div class="max-w-6xl mx-auto flex justify-between items-center">

        <div>
            <h1 class="text-3xl font-bold">PENGUMUMAN KELULUSAN</h1>
            <p class="text-blue-600 font-bold text-sm">SMP NEGERI 2 KOTO GASIB</p>
        </div>

        <div class="flex gap-3 items-center">
            <img src="https://images.weserv.nl/?url=drive.google.com/uc?export=view&id=1EKto_2_eBJxMvmqO1qJdlbH_URdQpqgE" class="logo-img">

            <!-- FIX LOGO TUT WURI -->
            <img src="https://images.weserv.nl/?url=drive.google.com/uc?export=view&id=1lKN-Eh-YCzlyALEhuqjYj4b4PQk-dGEU" class="logo-img">
        </div>

    </div>
</header>

<!-- LOGIN -->
<main class="flex justify-center items-center min-h-screen">

<div id="loginForm" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">

    <input id="nisnInput" placeholder="NISN" class="w-full p-3 border rounded mb-3">
    <input id="tglInput" placeholder="Tanggal lahir (dd/mm/yyyy)" class="w-full p-3 border rounded mb-3">

    <button onclick="validasiAwal()" class="w-full bg-blue-600 text-white p-3 rounded">
        Lihat Hasil
    </button>

    <p id="errorBox" class="text-red-500 mt-3 hidden">Data tidak ditemukan</p>
</div>

<!-- HASIL -->
<div id="wrapperHasil" class="hidden w-full max-w-3xl">

<div id="resultCard" class="bg-white p-8 rounded-2xl shadow-xl">

    <h2 class="text-xl font-bold mb-4">HASIL KELULUSAN</h2>

    <table class="w-full text-sm">
        <tr><td>Nama</td><td id="outNama"></td></tr>
        <tr><td>TTL</td><td id="outTTL"></td></tr>
        <tr><td>NISN</td><td id="outNISN"></td></tr>
        <tr><td>Nilai</td><td id="outNilai"></td></tr>
    </table>

    <div class="mt-6 w-32 h-44 border relative">
        <img id="fotoSiswa" class="absolute w-full h-full object-cover hidden">
        <div id="placeholderFoto" class="text-xs flex items-center justify-center h-full">
            FOTO
        </div>
    </div>

</div>

</div>

</main>

<script>
const dataSiswa = {
    "0111552477": {
        nama:"AHMAD HANIF RAMADHAN",
        tgl:"22/08/2011",
        ttl:"Siak, 22 Agustus 2011",
        nilai:"85.21",
        fotoId:"https://i.imgur.com/8Km9tLL.jpg"
    }
};

let tempNisn="";

function validasiAwal(){
    const nisn=document.getElementById("nisnInput").value.trim();
    const tgl=document.getElementById("tglInput").value.trim();

    if(dataSiswa[nisn] && dataSiswa[nisn].tgl===tgl){
        tempNisn=nisn;
        bukaHasil();
    }else{
        document.getElementById("errorBox").classList.remove("hidden");
    }
}

function bukaHasil(){
    const s=dataSiswa[tempNisn];

    document.getElementById("outNama").innerText=s.nama;
    document.getElementById("outTTL").innerText=s.ttl;
    document.getElementById("outNISN").innerText=tempNisn;
    document.getElementById("outNilai").innerText=s.nilai;

    const foto=document.getElementById("fotoSiswa");
    const placeholder=document.getElementById("placeholderFoto");

    if(s.fotoId){
        foto.src=s.fotoId;

        foto.onload=()=>{
            foto.classList.remove("hidden");
            placeholder.style.display="none";
        };

        foto.onerror=()=>{
            placeholder.innerText="Foto tidak tersedia";
        };
    }

    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("wrapperHasil").classList.remove("hidden");
}
</script>

</body>
</html>
